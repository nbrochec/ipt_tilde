name: Sync from DYCI2/ipt_tilde
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SYNC_SSH_KEY }}" > ~/.ssh/ipt_sync
          chmod 600 ~/.ssh/ipt_sync
          echo "${{ secrets.BACKUP_SSH_KEY }}" > ~/.ssh/ipt_backup
          chmod 600 ~/.ssh/ipt_backup
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << EOF
          Host dyci
            HostName github.com
            User git
            IdentityFile ~/.ssh/ipt_sync
          Host nbrochec
            HostName github.com
            User git
            IdentityFile ~/.ssh/ipt_backup
          EOF

      - name: Mirror DYCI2 → nbrochec
        run: |
          git clone --mirror git@dyci:DYCI2/ipt_tilde.git repo
          cd repo
          git push git@nbrochec:nbrochec/ipt_tilde.git --mirror --force

      - name: Restore sync workflow
        run: |
          git clone git@nbrochec:nbrochec/ipt_tilde.git restore
          cd restore
          git config user.email "sync@github-actions"
          git config user.name "GitHub Actions"
          mkdir -p .github/workflows
          curl -s https://gist.githubusercontent.com/nbrochec/29b52d4856c77bca55f67384a7aea652/raw/sync.yml > .github/workflows/sync.yml
          git add .github/workflows/sync.yml
          git commit -m "Restore sync workflow" || true
          git push

      - name: Sync releases
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          releases=$(curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/DYCI2/ipt_tilde/releases)
          echo "$releases" | jq -c '.[]' | while read release; do
            tag=$(echo "$release" | jq -r '.tag_name')
            name=$(echo "$release" | jq -r '.name')
            body=$(echo "$release" | jq -r '.body' | jq -Rs .)
            prerelease=$(echo "$release" | jq -r '.prerelease')
            draft=$(echo "$release" | jq -r '.draft')
            existing=$(curl -s -H "Authorization: token $GH_TOKEN" \
              https://api.github.com/repos/nbrochec/ipt_tilde/releases/tags/$tag)
            if echo "$existing" | jq -e '.id' > /dev/null 2>&1; then
              echo "Release $tag already exists, skipping"
            else
              echo "Creating release $tag"
              curl -s -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Content-Type: application/json" \
                https://api.github.com/repos/nbrochec/ipt_tilde/releases \
                -d "{\"tag_name\":\"$tag\",\"name\":\"$name\",\"body\":$body,\"prerelease\":$prerelease,\"draft\":$draft}"
            fi
          done